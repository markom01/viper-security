backend:
  name: git-gateway
  repo: markom01/viper-security
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: hero
    label: Hero Section
    description: Homepage hero banner content
    files:
      - name: hero
        label: Hero Banner
        file: src/content/hero/hero.md
        fields:
          - { name: brand_name, label: Brand Name, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: subtitle, label: Subtitle, widget: text }
          - { name: cta_text, label: CTA Button Text, widget: string }
          - { name: phone_italy, label: Phone (Italy), widget: string, required: false }
          - { name: hero_image, label: "Hero Background Image", widget: image, required: false }
          - { name: phone_spain, label: Phone (Spain), widget: string, required: false }

  - name: services
    label: Services
    description: Services offered in both regions
    files:
      - name: services
        label: All Services
        file: src/content/services/services.md
        fields:
          - label: Services
            name: offerings
            widget: list
            fields:
              - { name: region, label: "Region (Marbella or Milano)", widget: string }
              - { name: title, label: Service Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: image, label: "Service Image", widget: image, required: false }

  - name: fleet
    label: Fleet
    description: Vehicle fleet information
    folder: src/content/fleet
    create: true
    slug: "{{name}}"
    fields:
      - { name: name, label: Vehicle Name, widget: string }
      - { name: type, label: Vehicle Type, widget: string, required: false }
      - { name: year, label: Year, widget: string, required: false }
      - { name: seats, label: Seats, widget: string, required: false }
      - { name: baggage, label: Baggage Capacity, widget: string, required: false }
      - { name: capacity_passengers, label: Max Passengers, widget: number, value_type: int, required: false }
      - { name: capacity_suitcases, label: Max Suitcases, widget: number, value_type: int, required: false }
      - { name: capacity_carryon, label: Max Carry-On Bags, widget: number, value_type: int, required: false }
      - label: Features
        name: features
        widget: list
        field: { label: Feature, name: feature, widget: string }
        required: false

  - name: pricing-hourly
    label: Hourly Pricing
    description: Hourly chauffeur service rates
    files:
      - name: hourly
        label: Hourly Rates
        file: src/content/pricing/hourly.md
        fields:
          - { name: type, label: Type, widget: hidden, default: hourly }
          - label: Rates
            name: rates
            widget: list
            fields:
              - { name: name, label: Duration, widget: string }
              - { name: price, label: Price, widget: string }


  - name: how-it-works
    label: How It Works
    description: How booking works steps
    files:
      - name: steps
        label: Steps
        file: src/content/how-it-works/steps.md
        fields:
          - label: Steps
            name: steps
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: image, label: "Service Image", widget: image, required: false }

  - name: membership
    label: VIP Membership
    description: VIP membership program tiers
    files:
      - name: tiers
        label: Membership Tiers
        file: src/content/membership/tiers.md
        fields:
          - label: Tiers
            name: tiers
            widget: list
            fields:
              - { name: name, label: Tier Name, widget: string }
              - { name: price, label: Annual Price, widget: string }
              - label: Benefits
                name: benefits
                widget: list
                field: { label: Benefit, name: benefit, widget: string }
              - { name: is_featured, label: Featured Tier, widget: boolean, default: false }

  - name: page-content
    label: Page Content
    description: All page labels, headings, and UI text
    files:
      - name: content
        label: All Page Text
        file: src/content/page-content/content.md
        fields:
          - label: JSON-LD
            name: jsonld_labels
            widget: meta
          - name: jsonld
            label: JSON-LD / Structured Data
            widget: object
            collapsed: true
            fields:
              - { name: org_name, label: Organization Name, widget: string }
              - { name: org_url, label: Organization URL, widget: string }
              - { name: org_logo, label: Logo URL, widget: string }
              - { name: org_description, label: Description, widget: text }
              - { name: phoneSpain, label: "Phone (Spain)", widget: string }
              - { name: phoneItaly, label: "Phone (Italy)", widget: string }
          - label: Booking Routes
            name: booking_data_labels
            widget: meta
          - name: booking_data
            label: Booking Routes
            widget: object
            collapsed: true
            fields:
              - label: Spain
                name: spain
                widget: object
                fields:
                  - { name: label, label: "Region Label", widget: string }
                  - { name: short_label, label: "Short Region Name", widget: string }
                  - label: Services
                    name: services
                    widget: list
                    fields:
                      - { name: name, label: "Service Name", widget: string }
                      - label: Routes
                        name: routes
                        widget: list
                        fields:
                          - { name: route, label: Route, widget: string }
                          - { name: price, label: "Price (optional)", widget: string, required: false }
              - label: Italy
                name: italy
                widget: object
                fields:
                  - { name: label, label: "Region Label", widget: string }
                  - { name: short_label, label: "Short Region Name", widget: string }
                  - label: Services
                    name: services
                    widget: list
                    fields:
                      - { name: name, label: "Service Name", widget: string }
                      - label: Routes
                        name: routes
                        widget: list
                        fields:
                          - { name: route, label: Route, widget: string }
                          - { name: price, label: "Price (optional)", widget: string, required: false }

           - label: SEO
            name: seo_labels
            widget: meta
          - name: seo
            label: SEO / Meta
            widget: object
            collapsed: true
            fields:
              - { name: title, label: Page Title, widget: string }
              - { name: description, label: Meta Description, widget: text }
              - { name: theme_color, label: Theme Color, widget: string }

           - label: About Section
           - label: About Section
            name: about_labels
            widget: meta
          - name: about
            label: About
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: Heading, widget: string }
              - { name: text, label: Body Text, widget: text }
              - { name: image, label: About Image, widget: image, required: false }
          - label: Fleet Section
            name: fleet_labels
            widget: meta
          - name: fleet
            label: Fleet
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: Heading, widget: string }
          - label: Stats Section
            name: stats_labels
            widget: meta
          - name: stats
            label: Stats
            widget: object
            collapsed: true
            fields:
              - { name: subheading, label: Subheading, widget: text }
              - label: Items
                name: items
                widget: list
                fields:
                  - { name: label, label: Label (e.g. 99%), widget: string }
                  - { name: title, label: Title (e.g. Client Satisfaction), widget: string }
          - label: How It Works
            name: howitworks_labels
            widget: meta
          - name: howitworks
            label: How It Works
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: Heading, widget: string }
          - label: CTA Banner
            name: cta_labels
            widget: meta
          - name: cta
            label: CTA Banner
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: Heading, widget: string }
              - { name: text, label: Body Text, widget: text }
              - { name: image, label: CTA Image, widget: image, required: false }
          - label: Bottom CTA
            name: bottomcta_labels
            widget: meta
          - name: bottomcta
            label: Bottom CTA
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: Heading, widget: string }
              - label: Values
                name: values
                widget: list
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: text, label: Text, widget: text }
          - label: Branding
            name: branding_labels
            widget: meta
          - name: branding
            label: Branding
            widget: object
            collapsed: true
            fields:
              - { name: luxury_without_limits, label: Luxury Without Limits Text, widget: string }
              - { name: professional_discreet_reliable, label: Professional Discreet Reliable Text, widget: string }
