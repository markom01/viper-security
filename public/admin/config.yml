backend:
  name: git-gateway
  repo: markom01/viper-security
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: hero
    label: Hero Section
    description: Homepage hero banner content
    files:
      - name: hero
        label: Hero Banner
        file: src/content/hero/hero.md
        fields:
          - { name: brand_name, label: Brand Name, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: subtitle, label: Subtitle, widget: text }
          - { name: cta_text, label: CTA Button Text, widget: string }
          - { name: phone_italy, label: Phone (Italy), widget: string, required: false }
          - { name: hero_image, label: "Hero Background Image", widget: image, required: false }
          - { name: phone_spain, label: Phone (Spain), widget: string, required: false }

  - name: services
    label: Services
    description: Services offered in both regions
    files:
      - name: services
        label: All Services
        file: src/content/services/services.md
        fields:
          - label: Services
            name: offerings
            widget: list
            fields:
              - { name: region, label: "Region (Marbella or Milano)", widget: string }
              - { name: title, label: Service Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: image, label: "Service Image", widget: image, required: false }

  - name: fleet
    label: Fleet
    description: Vehicle fleet information
    folder: src/content/fleet
    create: true
    slug: "{{name}}"
    fields:
      - { name: name, label: Vehicle Name, widget: string }
      - { name: type, label: Vehicle Type, widget: string, required: false }
      - { name: year, label: Year, widget: string, required: false }
      - { name: seats, label: Seats, widget: string, required: false }
      - { name: baggage, label: Baggage Capacity, widget: string, required: false }
      - { name: capacity_passengers, label: Max Passengers, widget: number, value_type: int, required: false }
      - { name: capacity_suitcases, label: Max Suitcases, widget: number, value_type: int, required: false }
      - { name: capacity_carryon, label: Max Carry-On Bags, widget: number, value_type: int, required: false }
      - label: Features
        name: features
        widget: list
        field: { label: Feature, name: feature, widget: string }
        required: false

  - name: pricing-hourly
    label: Hourly Pricing
    description: Hourly chauffeur service rates
    files:
      - name: hourly
        label: Hourly Rates
        file: src/content/pricing/hourly.md
        fields:
          - { name: type, label: Type, widget: hidden, default: hourly }
          - label: Rates
            name: rates
            widget: list
            fields:
              - { name: name, label: Duration, widget: string }
              - { name: price, label: Price, widget: string }

  - name: pricing-airport
    label: Airport Pricing
    description: Airport transfer route pricing
    files:
      - name: airport-transfers
        label: Airport Transfers
        file: src/content/pricing/airport-transfers.md
        fields:
          - { name: type, label: Type, widget: hidden, default: airport }
          - label: Routes
            name: routes
            widget: list
            fields:
              - { name: route, label: Route, widget: string }
              - { name: price, label: Price, widget: string }

  - name: how-it-works
    label: How It Works
    description: How booking works steps
    files:
      - name: steps
        label: Steps
        file: src/content/how-it-works/steps.md
        fields:
          - label: Steps
            name: steps
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: image, label: "Service Image", widget: image, required: false }

  - name: membership
    label: VIP Membership
    description: VIP membership program tiers
    files:
      - name: tiers
        label: Membership Tiers
        file: src/content/membership/tiers.md
        fields:
          - label: Tiers
            name: tiers
            widget: list
            fields:
              - { name: name, label: Tier Name, widget: string }
              - { name: price, label: Annual Price, widget: string }
              - label: Benefits
                name: benefits
                widget: list
                field: { label: Benefit, name: benefit, widget: string }
              - { name: is_featured, label: Featured Tier, widget: boolean, default: false }

  - name: page-content
    label: Page Content
    description: All page labels, headings, and UI text
    files:
      - name: content
        label: All Page Text
        file: src/content/page-content/content.md
        fields:
          - label: SEO
            name: seo_labels
            widget: meta
          - name: seo
            label: SEO / Meta
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Page Title", widget: string }
              - { name: description, label: "Meta Description", widget: text }
              - { name: theme_color, label: "Theme Color", widget: string }
          - label: Nav
            name: nav_labels
            widget: meta
          - name: nav
            label: Nav
            widget: object
            collapsed: true
            fields:
              - { name: home, label: "Home", widget: string }
              - { name: about, label: "About", widget: string }
              - { name: fleet, label: "Fleet", widget: string }
              - { name: services, label: "Services", widget: string }
              - { name: how_it_works, label: "How It Works", widget: string }
              - { name: pricing, label: "Pricing", widget: string }
              - { name: blog, label: "Blog", widget: string }
              - { name: contact, label: "Contact Us", widget: string }
              - { name: brand, label: "Brand Name", widget: string }
          - label: Hero
            name: hero_labels
            widget: meta
          - name: hero
            label: Hero
            widget: object
            collapsed: true
            fields:
              - { name: learn_more, label: "Learn More Button", widget: string }
              - { name: explore_fleet, label: "Explore Fleet Button", widget: string }
              - { name: image_alt, label: "Hero Image Alt Text", widget: string }
          - name: form
            label: Booking Form
            widget: object
            collapsed: true
            fields:
              - { name: location, label: "Location Label", widget: string }
              - { name: name, label: "Full Name Label", widget: string }
              - { name: phone, label: "Phone Label", widget: string }
              - { name: destination, label: "Destination Label", widget: string }
              - { name: date, label: "Date Label", widget: string }
              - { name: service, label: "Service Label", widget: string }
              - { name: success, label: "Success Message", widget: text }
              - { name: error, label: "Error Message", widget: text }
              - { name: name_placeholder, label: "Name Placeholder", widget: string }
              - { name: phone_placeholder, label: "Phone Placeholder", widget: string }
              - { name: book_now, label: "Book Now Button", widget: string }
              - { name: select_location, label: "Select Location Text", widget: string }
              - { name: option_spain, label: "Spain Option", widget: string }
              - { name: option_italy, label: "Italy Option", widget: string }
              - { name: choose_location_first, label: "Choose Location First", widget: string }
              - { name: select_service, label: "Select Service Text", widget: string }
              - { name: choose_service_first, label: "Choose Service First", widget: string }
              - { name: select_route, label: "Select Route Text", widget: string }
          - { name: marquee_text, label: "Marquee Text", widget: string }
          - label: About Section
            name: about_labels
            widget: meta
          - name: about
            label: About
            widget: object
            collapsed: true
            fields:
              - { name: subheadline, label: "Subheadline", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: text, label: "Body Text", widget: text }
              - { name: button, label: "Button Text", widget: string }
              - { name: image, label: "About Image", widget: image, required: false }
              - { name: image_alt, label: "About Image Alt Text", widget: string }
          - label: Services Section
            name: services_labels
            widget: meta
          - name: services
            label: Services
            widget: object
            collapsed: true
            fields:
              - { name: subheadline, label: "Subheadline", widget: string }
              - { name: all, label: "All Services Button", widget: string }
          - label: Fleet Section
            name: fleet_labels
            widget: meta
          - name: fleet
            label: Fleet
            widget: object
            collapsed: true
            fields:
              - { name: subheadline, label: "Subheadline", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: year, label: "Year Label", widget: string }
              - { name: seats, label: "Seats Label", widget: string }
              - { name: baggage, label: "Baggage Label", widget: string }
          - label: Stats Section
            name: stats_labels
            widget: meta
          - name: stats
            label: Stats
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: subheading, label: "Subheading", widget: text }
              - { name: button, label: "Button Text", widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { name: label, label: "Label (e.g. 99%)", widget: string }
                  - { name: title, label: "Title (e.g. Client Satisfaction)", widget: string }
          - label: How It Works
            name: howitworks_labels
            widget: meta
          - name: howitworks
            label: How It Works
            widget: object
            collapsed: true
            fields:
              - { name: subheadline, label: "Subheadline", widget: string }
              - { name: heading, label: "Heading", widget: string }
          - label: CTA Banner
            name: cta_labels
            widget: meta
          - name: cta
            label: CTA Banner
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: text, label: "Body Text", widget: text }
              - { name: button, label: "Button Text", widget: string }
              - { name: image_alt, label: "CTA Image Alt Text", widget: string }
          - label: Bottom CTA
            name: bottomcta_labels
            widget: meta
          - name: bottomcta
            label: Bottom CTA
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: button_services, label: "Services Button", widget: string }
              - { name: button_fleet, label: "Fleet Button", widget: string }
              - label: Values
                name: values
                widget: list
                fields:
                  - { name: title, label: "Title", widget: string }
                  - { name: text, label: "Text", widget: text }
          - label: Footer
            name: footer_labels
            widget: meta
          - name: footer
            label: Footer
            widget: object
            collapsed: true
            fields:
              - { name: button, label: "Button Text", widget: string }
              - { name: pages, label: "Pages Heading", widget: string }
              - { name: home, label: "Home Link", widget: string }
              - { name: about, label: "About Link", widget: string }
              - { name: fleet, label: "Fleet Link", widget: string }
              - { name: services, label: "Services Link", widget: string }
              - { name: how_it_works, label: "How It Works Link", widget: string }
              - { name: pricing, label: "Pricing Link", widget: string }
              - { name: contact, label: "Contact Link", widget: string }
              - { name: powered, label: "Powered By", widget: string }
              - { name: designed, label: "Designed By Prefix", widget: string }
              - { name: logo_alt, label: "Footer Logo Alt Text", widget: string }
              - { name: social_x, label: "X/Twitter Label", widget: string }
              - { name: social_tiktok, label: "TikTok Label", widget: string }
              - { name: social_instagram, label: "Instagram Label", widget: string }
              - { name: social_whatsapp, label: "WhatsApp Label", widget: string }
          - label: Pricing Section
            name: pricing_labels
            widget: meta
          - name: pricing
            label: Pricing
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Subheadline", widget: string }
              - { name: hourly_heading, label: "Hourly Heading", widget: string }
              - { name: airport_heading, label: "Airport Heading", widget: string }
          - label: Membership Section
            name: membership_labels
            widget: meta
          - name: membership
            label: VIP Membership
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Subheadline", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: badge, label: "Best Value Badge", widget: string }
              - { name: per_year, label: "Per Year Label", widget: string }
