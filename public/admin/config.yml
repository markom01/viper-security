backend:
  name: git-gateway
  repo: markom01/viper-security
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: hero
    label: Hero Section
    description: Homepage hero banner content
    files:
      - name: hero
        label: Hero Banner
        file: src/content/hero/hero.md
        fields:
          - { name: brand_name, label: Brand Name, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: subtitle, label: Subtitle, widget: text }
          - { name: cta_text, label: CTA Button Text, widget: string }
          - { name: phone_italy, label: Phone (Italy), widget: string, required: false }
          - { name: phone_spain, label: Phone (Spain), widget: string, required: false }

  - name: services-marbella
    label: Marbella Services
    description: Services offered in Costa del Sol / Marbella
    files:
      - name: marbella
        label: Marbella
        file: src/content/services/marbella.md
        fields:
          - { name: region, label: Region Name, widget: string }
          - label: Services
            name: services
            widget: list
            fields:
              - { name: title, label: Service Title, widget: string }
              - { name: description, label: Description, widget: text }

  - name: services-milano
    label: Milano Services
    description: Services offered in Northern Italy / Milano
    files:
      - name: milano
        label: Milano
        file: src/content/services/milano.md
        fields:
          - { name: region, label: Region Name, widget: string }
          - label: Services
            name: services
            widget: list
            fields:
              - { name: title, label: Service Title, widget: string }
              - { name: description, label: Description, widget: text }

  - name: fleet
    label: Fleet
    description: Vehicle fleet information
    folder: src/content/fleet
    create: true
    slug: "{{name}}"
    fields:
      - { name: name, label: Vehicle Name, widget: string }
      - { name: type, label: Vehicle Type, widget: string, required: false }
      - { name: year, label: Year, widget: string, required: false }
      - { name: seats, label: Seats, widget: string, required: false }
      - { name: baggage, label: Baggage Capacity, widget: string, required: false }
      - { name: capacity_passengers, label: Max Passengers, widget: number, value_type: int, required: false }
      - { name: capacity_suitcases, label: Max Suitcases, widget: number, value_type: int, required: false }
      - { name: capacity_carryon, label: Max Carry-On Bags, widget: number, value_type: int, required: false }
      - label: Features
        name: features
        widget: list
        field: { label: Feature, name: feature, widget: string }
        required: false

  - name: pricing-hourly
    label: Hourly Pricing
    description: Hourly chauffeur service rates
    files:
      - name: hourly
        label: Hourly Rates
        file: src/content/pricing/hourly.md
        fields:
          - { name: type, label: Type, widget: hidden, default: hourly }
          - label: Rates
            name: rates
            widget: list
            fields:
              - { name: name, label: Duration, widget: string }
              - { name: price, label: Price, widget: string }

  - name: pricing-airport
    label: Airport Pricing
    description: Airport transfer route pricing
    files:
      - name: airport-transfers
        label: Airport Transfers
        file: src/content/pricing/airport-transfers.md
        fields:
          - { name: type, label: Type, widget: hidden, default: airport }
          - label: Routes
            name: routes
            widget: list
            fields:
              - { name: route, label: Route, widget: string }
              - { name: price, label: Price, widget: string }

  - name: how-it-works
    label: How It Works
    description: How booking works steps
    files:
      - name: steps
        label: Steps
        file: src/content/how-it-works/steps.md
        fields:
          - label: Steps
            name: steps
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }

  - name: membership
    label: VIP Membership
    description: VIP membership program tiers
    files:
      - name: tiers
        label: Membership Tiers
        file: src/content/membership/tiers.md
        fields:
          - label: Tiers
            name: tiers
            widget: list
            fields:
              - { name: name, label: Tier Name, widget: string }
              - { name: price, label: Annual Price, widget: string }
              - label: Benefits
                name: benefits
                widget: list
                field: { label: Benefit, name: benefit, widget: string }
              - { name: is_featured, label: Featured Tier, widget: boolean, default: false }

  - name: page-content
    label: Page Content
    description: All page labels, headings, and UI text
    files:
      - name: content
        label: All Page Text
        file: src/content/page-content/content.md
        fields:
          - label: Nav
            name: nav_labels
            widget: meta
          - { name: nav_home, label: "Nav: Home", widget: string }
          - { name: nav_about, label: "Nav: About", widget: string }
          - { name: nav_fleet, label: "Nav: Fleet", widget: string }
          - { name: nav_services, label: "Nav: Services", widget: string }
          - { name: nav_blog, label: "Nav: Blog", widget: string }
          - { name: nav_contact, label: "Nav: Contact Us", widget: string }
          - { name: nav_brand, label: "Nav: Brand Name", widget: string }
          - label: Hero Area
            name: hero_labels
            widget: meta
          - { name: hero_learn_more, label: "Hero: Learn More Button", widget: string }
          - { name: hero_explore_fleet, label: "Hero: Explore Fleet Button", widget: string }
          - { name: form_name, label: "Form: Full Name Label", widget: string }
          - { name: form_phone, label: "Form: Phone Label", widget: string }
          - { name: form_pickup, label: "Form: Pick Up At Label", widget: string }
          - { name: form_date, label: "Form: Date Label", widget: string }
          - { name: form_service, label: "Form: Service Label", widget: string }
          - { name: form_success, label: "Form: Success Message", widget: text }
          - { name: form_error, label: "Form: Error Message", widget: text }
          - label: Marquee
            name: marquee_labels
            widget: meta
          - { name: marquee_text, label: "Marquee: Text", widget: string }
          - label: About Section
            name: about_labels
            widget: meta
          - { name: about_subheadline, label: "About: Subheadline", widget: string }
          - { name: about_heading, label: "About: Heading", widget: string }
          - { name: about_text, label: "About: Body Text", widget: text }
          - { name: about_button, label: "About: Button Text", widget: string }
          - label: Services Section
            name: services_labels
            widget: meta
          - { name: services_subheadline, label: "Services: Subheadline", widget: string }
          - { name: services_all, label: "Services: All Services Button", widget: string }
          - label: Fleet Section
            name: fleet_labels
            widget: meta
          - { name: fleet_subheadline, label: "Fleet: Subheadline", widget: string }
          - { name: fleet_heading, label: "Fleet: Heading", widget: string }
          - { name: fleet_year, label: "Fleet: Year Label", widget: string }
          - { name: fleet_seats, label: "Fleet: Seats Label", widget: string }
          - { name: fleet_baggage, label: "Fleet: Baggage Label", widget: string }
          - label: Stats Section
            name: stats_labels
            widget: meta
          - { name: stats_heading, label: "Stats: Heading", widget: string }
          - { name: stats_subheading, label: "Stats: Subheading", widget: text }
          - { name: stats_button, label: "Stats: Button Text", widget: string }
          - { name: stats_label_1, label: "Stats: Stat 1 Label (99%)", widget: string }
          - { name: stats_title_1, label: "Stats: Stat 1 Title", widget: string }
          - { name: stats_label_2, label: "Stats: Stat 2 Label (500+)", widget: string }
          - { name: stats_title_2, label: "Stats: Stat 2 Title", widget: string }
          - { name: stats_label_3, label: "Stats: Stat 3 Label (15+)", widget: string }
          - { name: stats_title_3, label: "Stats: Stat 3 Title", widget: string }
          - { name: stats_label_4, label: "Stats: Stat 4 Label (24/7)", widget: string }
          - { name: stats_title_4, label: "Stats: Stat 4 Title", widget: string }
          - label: How It Works
            name: howitworks_labels
            widget: meta
          - { name: howitworks_subheadline, label: "How It Works: Subheadline", widget: string }
          - { name: howitworks_heading, label: "How It Works: Heading", widget: string }
          - label: CTA Banner
            name: cta_labels
            widget: meta
          - { name: cta_heading, label: "CTA Banner: Heading", widget: string }
          - { name: cta_text, label: "CTA Banner: Body Text", widget: text }
          - { name: cta_button, label: "CTA Banner: Button Text", widget: string }
          - label: Bottom CTA
            name: bottomcta_labels
            widget: meta
          - { name: bottomcta_heading, label: "Bottom CTA: Heading", widget: string }
          - { name: bottomcta_button_services, label: "Bottom CTA: Services Button", widget: string }
          - { name: bottomcta_button_fleet, label: "Bottom CTA: Fleet Button", widget: string }
          - { name: bottomcta_value_1_title, label: "Bottom CTA: Value 1 Title", widget: string }
          - { name: bottomcta_value_1_text, label: "Bottom CTA: Value 1 Text", widget: text }
          - { name: bottomcta_value_2_title, label: "Bottom CTA: Value 2 Title", widget: string }
          - { name: bottomcta_value_2_text, label: "Bottom CTA: Value 2 Text", widget: text }
          - { name: bottomcta_value_3_title, label: "Bottom CTA: Value 3 Title", widget: string }
          - { name: bottomcta_value_3_text, label: "Bottom CTA: Value 3 Text", widget: text }
          - label: Footer
            name: footer_labels
            widget: meta
          - { name: footer_button, label: "Footer: Button Text", widget: string }
          - { name: footer_pages, label: "Footer: Pages Heading", widget: string }
          - { name: footer_home, label: "Footer: Home Link", widget: string }
          - { name: footer_about, label: "Footer: About Link", widget: string }
          - { name: footer_fleet, label: "Footer: Fleet Link", widget: string }
          - { name: footer_services, label: "Footer: Services Link", widget: string }
          - { name: footer_contact, label: "Footer: Contact Link", widget: string }
          - { name: footer_powered, label: "Footer: Powered By", widget: string }
          - { name: footer_designed, label: "Footer: Designed By Prefix", widget: string }
          - { name: footer_webflow, label: "Footer: Webflow Text", widget: string }
          - { name: footer_am_templates, label: "Footer: AM Templates Text", widget: string }
          - label: Pricing Section
            name: pricing_labels
            widget: meta
          - { name: pricing_title, label: "Pricing: Subheadline", widget: string }
          - { name: pricing_hourly_heading, label: "Pricing: Hourly Heading", widget: string }
          - { name: pricing_airport_heading, label: "Pricing: Airport Heading", widget: string }
          - label: Membership Section
            name: membership_labels
            widget: meta
          - { name: membership_title, label: "Membership: Subheadline", widget: string }
          - { name: membership_heading, label: "Membership: Heading", widget: string }
          - { name: membership_badge, label: "Membership: Best Value Badge", widget: string }
          - { name: membership_per_year, label: "Membership: Per Year Label", widget: string }
